# Cuts a release, and builds the thing a player actually downloads: a self-contained Windows app
# image (our jar, a trimmed Java runtime and a native launcher), zipped, with a checksum beside it.
#
# The version is never chosen by hand. release-please reads the conventional commits since the last
# release (feat -> minor, fix/perf -> patch, ! -> major), keeps a "chore: release X.Y.Z" pull request
# open with the CHANGELOG and version.txt bumped, and cuts the release when that PR is merged. See
# AGENTS.md, "Commit messages are load-bearing".
#
# The release is created as a DRAFT on purpose - download it, run the exe once, then publish it by
# hand. The suite proves the code works; nothing in CI can prove the packaged artifact *launches*,
# because it is an interactive hotkey app that needs the game. Nobody should find out from a player
# that the artifact was broken.
#
# Note the trigger is `main`, not a tag: a draft release does not create its git tag until it is
# published, so there is no tag to trigger on, and `gh release upload <tag>` cannot find a draft
# either. The assets go to the upload_url release-please hands back, which needs no tag.
name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # to create the release
  pull-requests: write # to open the "chore: release X.Y.Z" PR

jobs:
  release-please:
    runs-on: ubuntu-latest # no build here, just the API calls: seconds, not minutes
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      upload_url: ${{ steps.rp.outputs.upload_url }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  # Only when the release PR was merged and the (draft) release now exists.
  package:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25' # the toolchain is pinned to 25 and never downloads one

      - uses: gradle/actions/setup-gradle@v4

      # The whole suite, the reader's 217-frame calibration and the coverage gate included. A red
      # build leaves the draft release empty, which is exactly what it should look like.
      - name: Build and test
        run: .\gradlew.bat build --console=plain "-PappVersion=${{ needs.release-please.outputs.version }}"

      - name: Package the portable app image
        run: .\gradlew.bat releaseZip --console=plain "-PappVersion=${{ needs.release-please.outputs.version }}"

      - name: Checksum
        shell: pwsh
        run: |
          Get-ChildItem build\release\*.zip | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
          }

      # Straight to the release's upload_url. It is an RFC-6570 template ending in "{?name,label}",
      # so the template suffix comes off and each file goes up with its name as a query parameter.
      - name: Attach the zip and its checksum to the draft release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $url = "${{ needs.release-please.outputs.upload_url }}" -replace '\{[^}]*\}$', ''
          Get-ChildItem build\release\* -Include *.zip, *.sha256 | ForEach-Object {
            Write-Host "uploading $($_.Name) ($([math]::Round($_.Length / 1MB, 1)) MB)"
            Invoke-RestMethod -Method Post -Uri "$url`?name=$($_.Name)" -InFile $_.FullName `
              -Headers @{
                Authorization = "Bearer $env:GITHUB_TOKEN"
                Accept        = 'application/vnd.github+json'
              } `
              -ContentType 'application/octet-stream' | Out-Null
          }
          Write-Host "Draft release ${{ needs.release-please.outputs.tag_name }} is ready." `
            "Run the exe once, then publish it."
