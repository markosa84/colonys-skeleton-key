# Compiles and runs the test suite on every push and pull request.
#
# The whole suite runs here, the reader's calibration included: the labelled frames are in the
# repository, LockReader is pure frame analysis, and the tests are headless. So a green run means
# the reader has been verified against all 217 frames on a machine that is not the author's - which
# is the only independent check this project has. The frame-driven classes fail rather than skip
# when the frames are missing, so the gate cannot quietly disappear.
name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: .\gradlew.bat build --console=plain

      - name: Keep the test report when something fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
